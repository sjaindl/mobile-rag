sqldelight-coroutines-extensions = { module = "app.cash.sqldelight:coroutines-extensions", version.ref = "sqldelight" }
mobile-rag-assistant = { module = "io.github.sjaindl:mobile-rag-assistant", version.ref = "mobile_rag_assistant" }

[bundles]
compose = ["compose_runtime", "compose_foundation", "compose_material3", "compose_ui", "compose_components_resources", "compose_ui_tooling_preview", "compose_material_icons_extended"]

[plugins]
android-application = { id = "com.android.application", version.ref = "gradle" }
android_kotlin_multiplatform_library = { id = "com.android.kotlin.multiplatform.library", version.ref = "gradle" }
kotlin_multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
compose_multiplatform = { id = "org.jetbrains.compose", version.ref = "compose_multiplatform" }
compose_compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlin_serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
vanniktech_maven_publish = { id = "com.vanniktech.maven.publish", version.ref = "vanniktech_maven_publish" }
sqldelight = { id = "app.cash.sqldelight", version.ref = "sqldelight" }
buildkonfig = { id = "com.github.gmazzo.buildconfig", version.ref = "buildkonfig" }
dokka = { id = "org.jetbrains.dokka", version.ref = "dokka" }
