coil_compose = {group = "io.coil-kt.coil3", name = "coil-compose", version.ref = "coil" }
coil_ktor = { group = "io.coil-kt.coil3", name = "coil-network-ktor2", version.ref = "coil" }
compose_activity = { group = "androidx.activity", name = "activity-compose", version.ref = "compose_activity" }
compose_runtime = { group = "org.jetbrains.compose.runtime", name = "runtime", version.ref = "compose_multiplatform" }
compose_foundation = { group = "org.jetbrains.compose.foundation", name = "foundation", version.ref = "compose_multiplatform" }
compose_material3 = { group = "org.jetbrains.compose.material3", name = "material3", version.ref = "compose_material3" }
