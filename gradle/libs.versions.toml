compose_multiplatform_windowSize = { group = "org.jetbrains.compose.material3", name = "material3-window-size-class", version.ref = "multiplatformWindowSizeClass" }
kotlinx-coroutines-swing = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-swing", version.ref = "coroutines" }
koin_android = { group = "io.insert-koin", name = "koin-android" }
koin_annotations = { group = "io.insert-koin", name = "koin-annotations" }
koin_annotations_bom = { group = "io.insert-koin", name = "koin-annotations-bom", version.ref = "koinAnnotations" }
