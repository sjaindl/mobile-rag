compose_ui_tooling = { group = "org.jetbrains.compose.ui", name = "ui-tooling", version.ref = "compose_multiplatform" }
compose_ui_tooling_preview = { group = "org.jetbrains.compose.ui", name = "ui-tooling-preview", version.ref = "compose_multiplatform" }
compose_components_resources = { group = "org.jetbrains.compose.components", name = "components-resources", version.ref = "compose_multiplatform" }
compose_material_icons_extended = { group = "org.jetbrains.compose.material", name = "material-icons-extended", version.ref = "compose_material_icons_extended" }
